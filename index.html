// ── Spoiler helpers ──
function mkSp(books, au, sa) {
  const rs = new Set();
  books.forEach(b => b.read && rs.add(b.id));
  au.forEach(a => a.read && rs.add(a.id));
  return {
    u: (req) => sa || req.every(id => rs.has(id)),
    uA: (req) => sa || req.length === 0 || req.some(id => rs.has(id)),
    sa
  };
}

  {name:"Taldain",icon:"\u2600",color:"#f59e0b",bg:"#2a2210",db:"Tidally locked world.",

    sh:[{name:"Autonomy",r:["ws_ex"],d:"Independence. Vessel: Bavadin.",su:[{t:"Isolation",r:["ws_ex"],c:"Taldain cut off from Cosmere."},{t:"Avatars",r:["bom"],c:"Sends avatars to other worlds."},{t:"Scadrial",r:["tlm"],c:"Attempted invasion via the Set."}]}],
    mg:[{name:"Sand Mastery",r:["ws_ex"],d:"Control sun-charged sand."},{name:"Starmarks",r:["ws_ex"],d:"Darkside tattoo magic."}],

    mg:[{name:"Simple Rules",r:["shadows"],d:"No fire, blood, or running at night.",su:[{t:"Silver",r:["shadows"],c:"Repels Shades."}]}],
    bk:["shadows"]},
  {name:"First of the Sun",icon:"\uD83D\uDC26",color:"#4dc470",bg:"#1a2a1e",db:"Deadly tropical islands.",
    ds:[{r:["6th"],t:"Trappers bond with magical Aviar birds."},{r:["ember"],t:"Spacefaring civilizations want the Aviar."}],
    sh:[{name:"No full Shard",r:["6th"],d:"Patji has Investiture.",su:[{t:"Autonomy's Avatar",r:["bom"],c:"Patji is an avatar."}]}],
    mg:[{name:"Aviar Bonding",r:["6th"],d:"Birds gain abilities from worms.",su:[{t:"Abilities",r:["6th"],c:"Kokerlii: hide mind. Sak: see danger."}]}],
    bk:["6th","ember"]},
  {name:"Lumar",icon:"\uD83C\uDF0A",color:"#4dc4b8",bg:"#1a2a2a",db:"Spore seas and twelve moons.",
    ds:[{r:["tress"],t:"Twelve moons rain spores that react to water."}],
    sh:[{name:"No Shard",r:["tress"],d:"Aethers present.",su:[]}],
    mg:[{name:"Spore Magic",r:["tress"],d:"12 spore types from 12 moons.",su:[{t:"Types",r:["tress"],c:"Verdant: vines. Zephyr: air. Roseite: crystal. Midnight: Commandable."}]}],
    bk:["tress"]},
  {name:"Komashi",icon:"\uD83C\uDFA8",color:"#ec4899",bg:"#2a1a22",db:"Two linked cultures.",
    ds:[{r:["yumi"],t:"Spirits summoned by stone-stacking; nightmares painted to contain them."}],
    sh:[{name:"Virtuosity",r:["yumi"],d:"Voluntarily Splintered.",su:[{t:"Splinters",r:["yumi"],c:"Became spirits and nightmares."}]}],
    mg:[{name:"Spirit Summoning",r:["yumi"],d:"Stack stones for spirits."},{name:"Nightmare Painting",r:["yumi"],d:"Ink traps corrupted Splinters."}],

  {name:"Canticle",icon:"\uD83D\uDD25",color:"#f97316",bg:"#2a1c10",db:"Far-future world.",

const SER = ["Stormlight Archive","Mistborn Era 1","Mistborn Era 2","Standalone","Secret Projects"];
const SC = {
  "Stormlight Archive":{bg:"#1a2744",a:"#4a9eff",g:"rgba(74,158,255,0.15)"},
  "Mistborn Era 1":{bg:"#2a1a1a",a:"#c44d4d",g:"rgba(196,77,77,0.15)"},
  "Mistborn Era 2":{bg:"#2a2019",a:"#c49a4d",g:"rgba(196,154,77,0.15)"},
  "Standalone":{bg:"#1a2a1e",a:"#4dc470",g:"rgba(77,196,112,0.15)"},
  "Secret Projects":{bg:"#1a2a2a",a:"#4dc4b8",g:"rgba(77,196,184,0.15)"},
  "AU":{bg:"#251a2a",a:"#9b4dc4",g:"rgba(155,77,196,0.15)"},
};
const WI = {"Roshar":"\u26C8","Scadrial":"\uD83C\uDF2B","Sel":"\u2726","Nalthis":"\uD83C\uDF08","Threnody":"\uD83D\uDC7B","First of the Sun":"\uD83D\uDC26","Taldain":"\u2600","Lumar":"\uD83C\uDF0A","Komashi":"\uD83C\uDFA8","Canticle":"\uD83D\uDD25"};
const fm = n => n.toLocaleString();

// ── Shared UI ──
function Toggle({on, set}) {
  return (
    <div style={{display:"flex",justifyContent:"center",marginBottom:"16px",gap:"12px",alignItems:"center"}}>
      <span style={{fontSize:"13px",color:"#64748b"}}>Progressive</span>
      <button onClick={function(){set(!on);}} style={{width:"48px",height:"26px",borderRadius:"13px",border:"none",cursor:"pointer",background:on?"#4a9eff":"#334155",position:"relative"}}>
        <div style={{width:"20px",height:"20px",borderRadius:"50%",background:"#fff",position:"absolute",top:"3px",left:on?"25px":"3px"}} />
      </button>
      <span style={{fontSize:"13px",color:on?"#4a9eff":"#64748b"}}>Show all</span>
    </div>
  );
}

function Sec({title, color, desc, children}) {
  var s = useState(false);
  var open = s[0];
  var setOpen = s[1];
  return (
    <div style={{marginBottom:"8px",background:color+"06",borderRadius:"8px",border:"1px solid "+color+"12",overflow:"hidden"}}>
      <button onClick={function(){setOpen(!open);}} style={{width:"100%",padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"14px",fontWeight:600,color:color}}>{title}</div>
          {desc && <div style={{fontSize:"12px",color:"#94a3b8",marginTop:"2px"}}>{desc}</div>}
        </div>
        {children && <span style={{fontSize:"12px",color:"#64748b",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}>v</span>}
      </button>
      {open && children && <div style={{padding:"0 14px 10px"}}>{children}</div>}
    </div>
  );
}

function SubSec({title, color, content}) {
  var s = useState(false);
  var open = s[0];
  var setOpen = s[1];
  return (
    <div>
      <button onClick={function(){setOpen(!open);}} style={{width:"100%",padding:"6px 0",background:"transparent",border:"none",borderTop:"1px solid "+color+"10",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:"12px",color:color,fontFamily:"'Cinzel',serif"}}>{title}</span>
        <span style={{fontSize:"11px",color:"#64748b",transform:open?"rotate(180deg)":"rotate(0deg)"}}>v</span>
      </button>
      {open && <p style={{fontSize:"12px",color:"#94a3b8",lineHeight:1.7,margin:"4px 0 8px",whiteSpace:"pre-line"}}>{content}</p>}
    </div>
  );
}

// ── Tab 1: Reading List ──
function TabList({books, setBooks, au, setAu, filter, setFilter}) {
  function tR(id) { setBooks(function(p){return p.map(function(b){return b.id===id?Object.assign({},b,{read:!b.read,owned:!b.read?true:b.owned}):b;});}); }
  function tO(id) { setBooks(function(p){return p.map(function(b){return b.id===id?Object.assign({},b,{owned:!b.owned}):b;});}); }
  function tA(id) { setAu(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{read:!s.read,owned:!s.read?true:s.owned}):s;});}); }
  function tOA(id) { setAu(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{owned:!s.owned}):s;});}); }
  var expState = useState({});
  var exp = expState[0];
  function toggleExp(k) { expState[1](function(p){var n={};for(var x in p)n[x]=p[x];n[k]=!p[k];return n;}); }

  var fil = books.filter(function(b) {
    if (filter==="read") return b.read;
    if (filter==="unread") return !b.read;
    if (filter==="owned") return b.owned && !b.read;
    return true;
  });
  var auFil = au.filter(function(s) {
    if (filter==="read") return s.read;
    if (filter==="unread") return !s.read;
    return filter==="all";
  });

  var all = books.concat(au);
  // Two reading orders — community recommended vs publication
  var RO_COMMUNITY = [
    "warb",                                                 // Warbreaker (for SA connections)
    "tfe","woa","hoa",                                     // Mistborn Era 1
    "11th","sh",                                           // Mistborn short stories
    "elan","hope","es",                                    // Sel (Elantris + AU stories)
    "twok","wor","edge","oath",                            // Stormlight 1-3
    "dawn","row",                                          // Stormlight 4
    "aol","jak","sos","bom",                               // Mistborn Era 2
    "tlm",                                                  // Mistborn Era 2 finale
    "shadows","6th","ws_ex",                               // AU standalones
    "wat",                                                  // Stormlight 5
    "tress","yumi","sunlit","ember"                         // Secret Projects (after SA5)
  ];
  var RO_PUBLICATION = [
    "elan",                                                 // 2005
    "hope",                                                 // 2006 (AU)
    "tfe","woa","hoa",                                     // 2006-2008
    "warb",                                                 // 2009
    "twok",                                                 // 2010
    "aol",                                                  // 2011
    "11th",                                                 // 2011 (AU)
    "es",                                                   // 2012
    "shadows",                                              // 2013 (AU)
    "wor",                                                  // 2014
    "6th",                                                  // 2014 (AU)
    "sos","bom",                                           // 2015-2016
    "sh",                                                   // 2016 (AU)
    "edge",                                                 // 2016 (AU)
    "jak",                                                  // 2016 (AU)
    "ws_ex",                                                // 2016 (AU)
    "oath",                                                 // 2017
    "dawn","row",                                          // 2020
    "tlm",                                                  // 2022
    "tress","yumi","sunlit",                                // 2023
    "wat",                                                  // 2024
    "ember"                                                 // 2025
  ];
  var roState = useState("community");
  var roMode = roState[0];
  var setRoMode = roState[1];
  var activeRO = roMode === "community" ? RO_COMMUNITY : RO_PUBLICATION;
  var nUAll = activeRO.filter(function(id){var b=all.find(function(x){return x.id===id;});return b&&!b.read;});
  var roExpandedState = useState(false);
  var roExpanded = roExpandedState[0];
  var setRoExpanded = roExpandedState[1];
  var nU = roExpanded ? nUAll : nUAll.slice(0, 4);

  var auC = SC["AU"];
  var auRead = au.filter(function(s){return s.read;}).length;

  function renderBook(bk, c, togRead, togOwn, i, total) {
    return (
      <div key={bk.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 20px",borderBottom:i<total-1?"1px solid "+c.a+"11":"none",opacity:bk.read?0.55:1}}>
        <button onClick={function(){togRead(bk.id);}} style={{width:"22px",height:"22px",borderRadius:"50%",border:bk.read?"2px solid "+c.a:"2px solid #475569",background:bk.read?c.a:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"11px",color:bk.read?"#fff":"transparent"}}>{"✓"}</button>
        <span style={{fontSize:"16px",flexShrink:0,width:"24px",textAlign:"center"}}>{WI[bk.world]||"."}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"15px",fontWeight:600,color:bk.read?"#94a3b8":"#e2e8f0",textDecoration:bk.read?"line-through":"none"}}>{bk.title}</div>
          <div style={{fontSize:"12px",color:"#64748b",marginTop:"2px"}}>
            {bk.ps && <span style={{color:c.a,opacity:0.7}}>{bk.ps} · </span>}
            {bk.world} · {bk.type} · {bk.pages} pp
            {bk.note && <span style={{color:c.a,opacity:0.6}}> · {bk.note}</span>}
            {bk.sn && <span style={{color:"#f59e0b",opacity:0.8}}> · {"⚠"} {bk.sn}</span>}
          </div>
        </div>
        {!bk.read && togOwn && <button onClick={function(){togOwn(bk.id);}} style={{padding:"4px 10px",borderRadius:"6px",border:bk.owned?"1px solid "+c.a+"44":"1px solid #334155",background:bk.owned?c.a+"11":"transparent",color:bk.owned?c.a:"#475569",fontSize:"11px",fontFamily:"'Cinzel',serif",cursor:"pointer",flexShrink:0}}>{bk.owned?"OWNED":"NEED"}</button>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",gap:"8px",justifyContent:"center",flexWrap:"wrap",marginBottom:"24px"}}>
        {[{k:"all",l:"All"},{k:"read",l:"Read"},{k:"unread",l:"Unread"},{k:"owned",l:"Owned & Unread"}].map(function(f) {
          return <button key={f.k} onClick={function(){setFilter(f.k);}} style={{padding:"6px 16px",borderRadius:"20px",border:filter===f.k?"1px solid #4a9eff":"1px solid #334155",background:filter===f.k?"rgba(74,158,255,0.12)":"transparent",color:filter===f.k?"#4a9eff":"#94a3b8",fontSize:"12px",fontFamily:"'Cinzel',serif",cursor:"pointer"}}>{f.l}</button>;
        })}
      </div>

      {nU.length > 0 && filter !== "read" && (
        <div style={{margin:"0 0 24px",padding:"20px 24px",background:"linear-gradient(135deg,rgba(74,158,255,0.06),rgba(155,77,196,0.06))",border:"1px solid rgba(74,158,255,0.15)",borderRadius:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:"#4a9eff"}}>Suggested Reading Order</span>
            <div style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"9px",letterSpacing:"1px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>
              <span style={{color:roMode==="community"?"#4a9eff":"#475569"}}>Community</span>
              <button onClick={function(){setRoMode(roMode==="community"?"publication":"community");}} style={{width:"36px",height:"18px",borderRadius:"9px",border:"none",background:roMode==="community"?"#1e3a5f":"#3a2a1e",cursor:"pointer",position:"relative",padding:0}}>
                <span style={{position:"absolute",top:"2px",left:roMode==="community"?"2px":"18px",width:"14px",height:"14px",borderRadius:"50%",background:roMode==="community"?"#4a9eff":"#c49a4d",transition:"left 0.2s"}} />
              </button>
              <span style={{color:roMode==="publication"?"#c49a4d":"#475569"}}>Publication</span>
            </div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center"}}>
            {nU.map(function(id, i) {
              var it = all.find(function(x){return x.id===id;});
              if (!it) return null;
              var c = it.series ? SC[it.series] : auC;
              return (
                <div key={id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{padding:"4px 12px",borderRadius:"6px",background:c.g,border:"1px solid "+c.a+"33",color:c.a,fontSize:"13px",whiteSpace:"nowrap"}}>{(i+1)+". "+it.title+(it.owned?" \uD83D\uDCD6":"")}</span>
                  {i < nU.length - 1 && <span style={{color:"#334155",fontSize:"10px"}}>{"→"}</span>}
                </div>
              );
            })}
            {!roExpanded && nUAll.length > 4 && (
              <button onClick={function(){setRoExpanded(true);}} style={{padding:"4px 12px",borderRadius:"6px",border:"1px solid #334155",background:"transparent",color:"#64748b",fontSize:"12px",fontFamily:"'Cinzel',serif",cursor:"pointer"}}>{"+ "+(nUAll.length - 4)+" more"}</button>
            )}
            {roExpanded && nUAll.length > 4 && (
              <button onClick={function(){setRoExpanded(false);}} style={{padding:"4px 12px",borderRadius:"6px",border:"1px solid #334155",background:"transparent",color:"#64748b",fontSize:"12px",fontFamily:"'Cinzel',serif",cursor:"pointer"}}>Show less</button>
            )}
          </div>
        </div>
      )}

      {SER.map(function(series) {
        var sb = fil.filter(function(b){return b.series===series;}).sort(function(a,b){return a.so-b.so;});
        if (sb.length === 0) return null;
        var c = SC[series];
        var ri = sb.filter(function(b){return b.read;}).length;
        var sp = sb.reduce(function(s,b){return s+b.pages;},0);
        var spr = sb.filter(function(b){return b.read;}).reduce(function(s,b){return s+b.pages;},0);
        var isE = exp[series] === true;
        return (
          <div key={series} style={{marginBottom:"16px"}}>
            <button onClick={function(){toggleExp(series);}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:c.bg,border:"1px solid "+c.a+"22",borderRadius:isE?"10px 10px 0 0":"10px",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <div style={{width:"3px",height:"24px",background:c.a,borderRadius:"2px"}} />
                <span style={{fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600,color:"#e2e8f0"}}>{series}</span>
                <span style={{fontSize:"12px",color:c.a,opacity:0.7}}>{ri+"/"+sb.length}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
                <span style={{fontSize:"12px",color:"#64748b"}}>{fm(spr)+"/"+fm(sp)+" pp"}</span>
                <span style={{color:"#64748b",fontSize:"14px",transform:isE?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
              </div>
            </button>
            {isE && (
              <div style={{background:c.bg+"88",border:"1px solid "+c.a+"22",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
                {sb.map(function(bk, i) { return renderBook(bk, c, tR, tO, i, sb.length); })}
              </div>
            )}
          </div>
        );
      })}

      {(filter === "all" || auFil.length > 0) && (
        <div style={{marginBottom:"16px"}}>
          <button onClick={function(){toggleExp("AU");}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:auC.bg,border:"1px solid "+auC.a+"22",borderRadius:exp["AU"]===true?"10px 10px 0 0":"10px",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <div style={{width:"3px",height:"24px",background:auC.a,borderRadius:"2px"}} />
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600,color:"#e2e8f0"}}>Arcanum Unbounded</span>
              <span style={{fontSize:"12px",color:auC.a,opacity:0.7}}>{auRead+"/"+au.length}</span>
            </div>
            <span style={{color:"#64748b",fontSize:"14px",transform:exp["AU"]===true?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
          </button>
          {exp["AU"] !== false && (
            <div style={{background:auC.bg+"88",border:"1px solid "+auC.a+"22",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
              <div style={{padding:"10px 20px 6px",fontSize:"12px",color:"#64748b",fontStyle:"italic"}}>A collection of Cosmere short fiction.</div>
              {auFil.map(function(st, i) { return renderBook(st, auC, tA, tOA, i, auFil.length); })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Tab 2: Worlds ──
function TabWorlds({books, sa, setSA, sp}) {
  var u = sp.u;
  var expanded = useState(null);
  var sel = expanded[0];
  var setSel = expanded[1];

  return (
    <div>
      <Toggle on={sa} set={setSA} />
      {!sa && <p style={{textAlign:"center",color:"#64748b",fontSize:"12px",marginBottom:"20px",fontStyle:"italic"}}>Lore reveals as you read.</p>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"16px"}}>
        {WD.map(function(w) {
          var isO = sel === w.name;
          var wb = w.bk.map(function(id){return books.find(function(b){return b.id===id;});}).filter(Boolean);
          var anyR = wb.some(function(b){return b.read;}) || sa;
          var rc = wb.filter(function(b){return b.read;}).length;

          if (!anyR) return (
            <div key={w.name} style={{background:w.bg,border:"1px solid "+w.color+"15",borderRadius:"12px",padding:"20px",opacity:0.4}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",background:w.color+"10",border:"2px solid "+w.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px"}}>{w.icon}</div>
                <div><div style={{fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:600,color:"#475569"}}>{w.name}</div><div style={{fontSize:"12px",color:"#334155"}}>Read books to unlock</div></div>
              </div>
            </div>
          );

          var uD = w.ds.filter(function(d){return u(d.r);});
          var uSh = w.sh.filter(function(s){return u(s.r);});
          var uMg = w.mg.filter(function(m){return u(m.r);});

          return (
            <div key={w.name} onClick={function(){if(!isO)setSel(w.name);}} style={{background:w.bg,border:"1px solid "+w.color+(isO?"44":"22"),borderRadius:"12px",cursor:isO?"default":"pointer",overflow:"hidden"}}>
              <div style={{padding:"20px 20px 16px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer"}} onClick={function(){setSel(isO?null:w.name);}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",background:w.color+"18",border:"2px solid "+w.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:0}}>{w.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:600,color:w.color}}>{w.name}</div>
                  <div style={{fontSize:"12px",color:"#64748b"}}>{rc+"/"+wb.length+" books"}</div>
                </div>
                <span style={{color:"#64748b",fontSize:"14px",transform:isO?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
              </div>
              {isO && (
                <div style={{padding:"0 20px 20px"}}>
                  <p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.6,margin:"0 0 8px"}}>{w.db}</p>

function makeStars() {
  var stars = [];
  for (var i = 0; i < 60; i++) {
    stars.push({
      cx: (i * 17 + 7) % 100,
      cy: (i * 23 + 11) % 100,
      r: 0.1 + ((i * 7) % 10) * 0.03,
      fill: i % 7 === 0 ? "#fbbf24" : i % 11 === 0 ? "#ef4444" : "#e2e8f0",
      op: 0.15 + ((i * 3) % 10) * 0.035
    });
  }
  return stars;
}
var STARS = makeStars();

function ProgressArc(props) {
  if (props.pct <= 0 || props.pct >= 1) return null;
  var circ = 2 * Math.PI * props.r;
  return (
    <circle cx={props.cx} cy={props.cy} r={props.r} fill="none" stroke={props.color}
      strokeWidth="0.5" strokeDasharray={circ * props.pct + " " + circ * (1 - props.pct)}
      strokeDashoffset={circ * 0.25} opacity="0.5"
      transform={"rotate(-90 " + props.cx + " " + props.cy + ")"} />
  );
}

function WorldMap(props) {
  var sel = props.sel;
  var mapInfo = WORLD_MAP_URLS[sel];
  if (!mapInfo) return null;

  var openState = useState(false);
  var isOpen = openState[0];
  var setOpen = openState[1];

  var loadState = useState("idle"); // idle | loading | loaded | error
  var loadStatus = loadState[0];
  var setLoadStatus = loadState[1];

  var color = sel === "Roshar" ? "#4a9eff" : "#c49a4d";

  function handleExpand() {
    if (!isOpen) setLoadStatus("loading");
    setOpen(!isOpen);
  }

  return (
    <div style={{marginTop:"12px",background:"#111827",border:"1px solid #1e293b",borderRadius:"10px",overflow:"hidden"}}>
      <button onClick={handleExpand} style={{width:"100%",padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:color,fontFamily:"'Cinzel',serif",fontWeight:600}}>{"🗺 Interactive Map"}</span>
        <span style={{color:"#64748b",fontSize:"14px",transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>{"▾"}</span>
      </button>
      {isOpen && (
        <div style={{padding:"0 12px 16px"}}>
          {/* Iframe container with aspect ratio */}
          <div style={{position:"relative",width:"100%",paddingBottom:"75%",background:"#0a0c14",borderRadius:"8px",border:"1px solid #1e293b",overflow:"hidden"}}>
            {loadStatus === "loading" && (
              <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",zIndex:1}}>
                <div style={{width:"24px",height:"24px",border:"2px solid #1e293b",borderTopColor:color,borderRadius:"50%",animation:"spin 1s linear infinite"}} />
                <span style={{fontSize:"11px",color:"#64748b"}}>Loading map...</span>
              </div>
            )}
            {loadStatus === "error" && (
              <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",padding:"20px",textAlign:"center"}}>
                <span style={{fontSize:"24px"}}>{"🗺"}</span>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>{"Map cannot be embedded."}</span>
                <span style={{fontSize:"11px",color:"#64748b"}}>{"Click below to open in a new tab."}</span>
              </div>
            )}
            <iframe
              src={mapInfo.url}
              style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none",borderRadius:"8px",display:loadStatus==="error"?"none":"block"}}
              title={mapInfo.label}
              sandbox="allow-scripts allow-same-origin"
              loading="lazy"
              onLoad={function(){setLoadStatus("loaded");}}
              onError={function(){setLoadStatus("error");}}
            />
          </div>
          {/* Open in new tab link + attribution */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"8px",padding:"0 2px"}}>
            <span style={{fontSize:"10px",color:"#475569"}}>{"Map by " + mapInfo.source}</span>
            <a href={mapInfo.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"10px",color:color,textDecoration:"none",display:"flex",alignItems:"center",gap:"4px"}}>
              {"Open in new tab ↗"}
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

function OrbitalDiagram(props) {
  var sys = props.sys;
  var sel = props.sel;
  var u = props.u;
  var color = props.color;
  if (!sys || !sys.planets) return null;

  var visPlanets = sys.planets.filter(function(pl){return u(pl.r);});
  if (visPlanets.length === 0) return null;

  var w = 300;
  var h = 260;
  var cx = w / 2;
  var cy = h * 0.38;
  var ecc = 0.38;

  // Compute orbit radii so the outermost orbit fits within the viewBox
  var maxOrbitR = Math.min(cx - 15, (h - 30) / ecc / 2);
  var n = visPlanets.length;
  var minOrbitR = 28;
  var step = n > 1 ? Math.min(30, (maxOrbitR - minOrbitR) / n) : 40;

  var selIdx = -1;
  visPlanets.forEach(function(pl, i) { if (pl.name === sel) selIdx = i; });

  // Angle assignments: selected at top, others evenly spread below
  function getAngle(i) {
    if (i === selIdx) return -90;
    var slot = i < selIdx ? i : i - 1;
    var total = n - (selIdx >= 0 ? 1 : 0);
    if (total <= 0) return 40;
    if (total === 1) return 90;
    // Alternate left and right in the lower half
    var side = slot % 2 === 0 ? 1 : -1;
    var tier = Math.floor(slot / 2);
    return 90 + side * (30 + tier * 35);
  }

  // Star colors
  var starFill = "#fbbf24";
  var starGlow = "#fbbf2433";
  if (sys.stars.length > 0) {
    var sType = (sys.stars[0].type || "").toLowerCase();
    if (sType.indexOf("blue") >= 0) { starFill = "#60a5fa"; starGlow = "#60a5fa33"; }
    else if (sType.indexOf("white dwarf") >= 0) { starFill = "#e2e8f0"; starGlow = "#e2e8f022"; }
  }

  return (
    <div style={{marginBottom:"8px"}}>
      <svg viewBox={"0 0 " + w + " " + h} style={{width:"100%",maxWidth:"500px",display:"block",margin:"0 auto"}}>
        {/* Star glow */}
        <circle cx={cx} cy={cy} r="22" fill={starGlow} />
        <circle cx={cx} cy={cy} r="13" fill={starGlow} />
        <circle cx={cx} cy={cy} r="6" fill={starFill} opacity="0.9" />

        {/* Binary star */}
        {sys.stars.length > 1 && (
          <g>
            <circle cx={cx + 16} cy={cy - 5} r="4" fill="#e2e8f0" opacity="0.6" />
            <circle cx={cx + 16} cy={cy - 5} r="8" fill="#e2e8f011" />
            {u(sys.stars[1].r) && sys.stars[1].name !== "Unnamed star" && (
              <text x={cx + 16} y={cy + 14} textAnchor="middle" fill="#475569" fontSize="7.5" fontFamily="serif">{sys.stars[1].name}</text>
            )}
          </g>
        )}

        {/* Star label */}
        {sys.stars.length > 0 && sys.stars[0].name && u(sys.stars[0].r) && sys.stars[0].name !== "Unnamed star" && (
          <text x={cx} y={cy + 26} textAnchor="middle" fill="#64748b" fontSize="8.5" fontFamily="serif">{sys.stars[0].name}</text>
        )}

        {/* Orbital rings and planets */}
        {visPlanets.map(function(pl, i) {
          var orbitR = minOrbitR + step * (i + 1);
          var isCurrent = i === selIdx;
          var angleDeg = getAngle(i);
          var angle = angleDeg * Math.PI / 180;
          var px = Math.max(30, Math.min(w - 30, cx + orbitR * Math.cos(angle)));
          var py = Math.max(20, Math.min(h - 30, cy + orbitR * Math.sin(angle) * ecc));
          var isGas = pl.tp === "gas";
          var isDwarf = pl.tp === "dwarf";
          var planetR = isGas ? 7.5 : isDwarf ? 3 : isCurrent ? 6 : 4.5;
          var planetColor = isCurrent ? color : isGas ? "#475569" : isDwarf ? "#334155" : "#94a3b8";
          // Label placement: below planet normally, above if planet is in lower half
          var labelBelow = py < cy + 20;
          var labelY = labelBelow ? py + planetR + 11 : py - planetR - 5;

          return (
            <g key={i}>
              {/* Orbital ellipse */}
              <ellipse cx={cx} cy={cy} rx={orbitR} ry={orbitR * ecc} fill="none" stroke={isCurrent ? color + "44" : "#1e293b"} strokeWidth={isCurrent ? "0.8" : "0.5"} opacity={isCurrent ? 0.7 : 0.35} />

              {/* Planet body */}
              <circle cx={px} cy={py} r={planetR} fill={isCurrent ? color : planetColor} opacity={isCurrent ? 0.9 : 0.5} />
              {isCurrent && <circle cx={px} cy={py} r={planetR + 5} fill="none" stroke={color} strokeWidth="0.6" opacity="0.3" />}

              {/* Gas giant ring */}
              {isGas && <ellipse cx={px} cy={py} rx={planetR + 3.5} ry={1.8} fill="none" stroke={planetColor} strokeWidth="0.5" opacity="0.35" />}

              {/* Moons — line them up beside the planet */}
              {pl.moons && pl.moons.length <= 6 && pl.moons.length > 1 && (
                <g>
                  {/* Moon orbit ring */}
                  <ellipse cx={px} cy={py} rx={planetR + 6} ry={planetR + 3} fill="none" stroke="#334155" strokeWidth="0.3" strokeDasharray="1,1" opacity="0.5" />
                  {pl.moons.map(function(mn, mi) {
                    var mAngle = (-120 + mi * (240 / Math.max(pl.moons.length - 1, 1))) * Math.PI / 180;
                    var mx = px + (planetR + 6) * Math.cos(mAngle);
                    var my = py + (planetR + 3) * Math.sin(mAngle);
                    var labelSide = mx < px ? "end" : "start";
                    var lx = mx < px ? mx - 3 : mx + 3;
                    return (
                      <g key={mi}>
                        <circle cx={mx} cy={my} r="1.5" fill="#94a3b8" opacity="0.6" />
                        <text x={lx} y={my + 1} textAnchor={labelSide} fill={isCurrent ? "#94a3b8" : "#475569"} fontSize="5.5" fontFamily="serif" fontStyle="italic">{mn}</text>
                      </g>
                    );
                  })}
                </g>
              )}
              {/* Single moon (Elegy/Coronach) */}
              {pl.moons && pl.moons.length === 1 && pl.moons[0].indexOf("12") < 0 && (
                <g>
                  <circle cx={px + 10} cy={py - 6} r="1.5" fill="#94a3b8" opacity="0.5" />
                  <text x={px + 10} y={py - 11} textAnchor="middle" fill={isCurrent ? "#94a3b8" : "#475569"} fontSize="6" fontFamily="serif" fontStyle="italic">{pl.moons[0]}</text>
                </g>
              )}
              {/* Many moons indicator (Lumar) */}
              {pl.moons && pl.moons.length === 1 && pl.moons[0].indexOf("12") >= 0 && (
                <text x={px} y={py - planetR - 8} textAnchor="middle" fill="#475569" fontSize="6.5" fontFamily="serif" fontStyle="italic">{pl.moons[0]}</text>
              )}

              {/* Planet label */}
              {!pl.count && (
                <text x={px} y={labelY} textAnchor="middle" fill={isCurrent ? color : "#64748b"} fontSize={isCurrent ? "10" : "7.5"} fontFamily="serif" fontWeight={isCurrent ? "600" : "400"}>{pl.name}</text>

function PlanetDetail(props) {
  var sel = props.sel;
  var books = props.books;
  var u = props.u;
  if (!sel) return null;
  var planet = PLANETS.find(function(p){return p.name === sel;});
  var world = WD.find(function(w){return w.name === sel;});
  if (!planet || !world) return null;
  var wb = books.filter(function(b){return b.world === sel;});
  var uD = world.ds.filter(function(d){return u(d.r);});
  var uSh = world.sh.filter(function(s){return u(s.r);});
  var sys = SYSTEMS[planet.sys] || null;

  var secHead = {fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:world.color,fontFamily:"'Cinzel',serif",marginBottom:"6px",opacity:0.8};

  return (
    <div style={{maxWidth:"800px",margin:"16px auto 0",padding:"20px 24px",background:world.bg,border:"1px solid " + world.color + "33",borderRadius:"12px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"12px"}}>
        <div style={{width:"40px",height:"40px",borderRadius:"50%",background:world.color+"18",border:"2px solid "+world.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{world.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"20px",fontWeight:600,color:world.color}}>{world.name}</div>
          <div style={{fontSize:"12px",color:"#64748b"}}>{planet.sys + " System"}</div>
        </div>
        <button onClick={function(){props.close();}} style={{background:"none",border:"1px solid #334155",borderRadius:"6px",padding:"4px 12px",color:"#64748b",cursor:"pointer",fontSize:"12px"}}>X</button>
      </div>
      <p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.6,margin:"0 0 8px"}}>{world.db}</p>
      {uD.map(function(d,i){return <p key={i} style={{fontSize:"13px",color:"#cbd5e1",lineHeight:1.6,margin:"0 0 8px"}}>{d.t}</p>;})}

      {/* System Overview */}
      {sys && (
        <div style={{marginTop:"12px",padding:"12px 14px",background:"#0a0c14",borderRadius:"8px",border:"1px solid #1e293b"}}>
          {/* Orbital diagram */}
          <OrbitalDiagram sys={sys} sel={sel} u={u} color={world.color} />
          {/* Perpendicularities */}
          {sys.perps.length > 0 && (
            <div style={{marginBottom:"8px"}}>
              <div style={secHead}>{"◇ Perpendicularities"}</div>
              {sys.perps.map(function(pp, i) {
                if (!u(pp.r)) return null;
                return (
                  <div key={i} style={{display:"flex",gap:"8px",padding:"3px 0",alignItems:"baseline"}}>
                    <span style={{fontSize:"13px",color:"#a78bfa"}}>{"◇"}</span>
                    <span style={{fontSize:"13px",color:"#cbd5e1"}}>{pp.name}</span>
                    <span style={{fontSize:"11px",color:"#64748b"}}>{pp.loc}</span>
                  </div>
                );
              })}
            </div>
          )}
          {/* Shards in system */}
          {sys.shards.length > 0 && (
            <div>
              <div style={secHead}>{"◆ Shards"}</div>
              {sys.shards.map(function(sh, i) {
                if (!u(sh.r)) return null;
                var display = sh.name;
                if (sh.after && u(sh.after.r)) display = sh.after.t;
                if (sh.status) display = display + " \u2014 " + sh.status;
                if (sh.noteR) { if (u(sh.noteR)) display = display + " (" + sh.note + ")"; }
                else if (sh.note) { display = display + " (" + sh.note + ")"; }
                return <div key={i} style={{fontSize:"13px",color:"#cbd5e1",padding:"2px 0"}}>{display}</div>;
              })}
            </div>
          )}
        </div>
      )}

      {/* World Map (collapsible) */}
      <WorldMap sel={sel} u={u} color={world.color} />

      {wb.length > 0 && (
        <div style={{marginTop:"10px"}}>
          <div style={secHead}>Books</div>
          {wb.map(function(bk) {
            return (
              <div key={bk.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"4px 0",opacity:bk.read?0.5:1}}>
                <span style={{width:"12px",height:"12px",borderRadius:"50%",border:"2px solid "+(bk.read?world.color:"#475569"),background:bk.read?world.color:"transparent",flexShrink:0,fontSize:"7px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{bk.read?"✓":""}</span>
                <span style={{fontSize:"13px",color:bk.read?"#64748b":"#e2e8f0"}}>{bk.title}</span>
                <span style={{fontSize:"11px",color:"#475569",marginLeft:"auto"}}>{bk.pages+" pp"}</span>
              </div>
            );
          })}
        </div>
      )}
      <p style={{fontSize:"11px",color:"#475569",marginTop:"10px",fontStyle:"italic"}}>See Worlds tab for magic systems.</p>
    </div>
  );
}

function StarMap(props) {
  var books = props.books;
  var u = props.sp.u;
  var uA = props.sp.uA;
  var selState = useState(null);
  var sel = selState[0];
  var setSel = selState[1];

  function gP(name) { return PLANETS.find(function(p){return p.name===name;}); }

  return (
    <div>
      <div style={{position:"relative",width:"100%",maxWidth:"800px",margin:"0 auto",aspectRatio:"4/3",background:"radial-gradient(ellipse at 50% 40%,#0f1729,#080c18 50%,#050810)",borderRadius:"16px",border:"1px solid #1e293b",overflow:"hidden"}}>
        <svg viewBox="0 0 100 100" style={{width:"100%",height:"100%"}}>
          {STARS.map(function(s, i) {
            return <circle key={"st"+i} cx={s.cx} cy={s.cy} r={s.r} fill={s.fill} opacity={s.op} />;
          })}
          {CONNS.map(function(cn, i) {
            if (!u(cn.r)) return null;
            var a = gP(cn.f);
            var b = gP(cn.t);
            return <line key={"cn"+i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#334155" strokeWidth="0.3" strokeDasharray="1,1" opacity="0.5" />;
          })}
          {PLANETS.map(function(p) {
            var vis = p.isY || uA(p.rA);
            var isSel = sel === p.name;
            var wb = books.filter(function(b){return b.world === p.name;});
            var rP = wb.length > 0 ? wb.filter(function(b){return b.read;}).length / wb.length : 0;
            var pr = p.r * 0.35;
            var sys = SYSTEMS[p.sys] || null;
            // Collect visible shards for this planet's system
            var visShards = [];
            if (vis && sys && sys.shards) {
              sys.shards.forEach(function(sh) {
                if (u(sh.r)) visShards.push(sh);
              });
            }

            if (p.isY) {
              return (
                <g key={p.name} onClick={function(){setSel(sel===p.name?null:p.name);}} style={{cursor:"pointer"}}>
                  <circle cx={p.x} cy={p.y} r={p.r*0.4} fill="none" stroke="#e2e8f033" strokeWidth="0.3" strokeDasharray="0.8,0.8" />
                  <circle cx={p.x} cy={p.y} r={2} fill="#e2e8f0" opacity="0.6" />
                  <text x={p.x} y={p.y+5} textAnchor="middle" fill="#64748b" fontSize="2.5" fontFamily="serif" style={{letterSpacing:"0.15em"}}>YOLEN</text>
                  <text x={p.x} y={p.y+7.5} textAnchor="middle" fill="#475569" fontSize="1.6" fontFamily="serif">Origin</text>
                </g>
              );
            }

            return (
              <g key={p.name}>
                {vis && <circle cx={p.x} cy={p.y} r={p.r*0.6} fill={p.color+"08"} />}
                {vis && <circle cx={p.x} cy={p.y} r={p.r*0.5} fill="none" stroke={p.color+"33"} strokeWidth="0.4" />}
                <circle cx={p.x} cy={p.y} r={vis ? pr : pr*0.6}
                  fill={vis ? p.color : "#1e293b"} opacity={vis ? 0.9 : 0.3}
                  stroke={isSel ? p.color : "none"} strokeWidth="0.8"
                  onClick={function(){if(vis)setSel(sel===p.name?null:p.name);}}
                  style={{cursor:vis?"pointer":"default"}} />
                {vis && <ProgressArc cx={p.x} cy={p.y} r={p.r*0.42} pct={rP} color={p.color} />}
                {visShards.length > 0 && visShards.map(function(sh, si) {
                  var sc = SHARD_COLORS[sh.name] || SHARD_COLORS[sh.name.split(" ")[0]] || "#94a3b8";
                  var dx = p.x + p.r * 0.5 + si * 3;
                  var dy = p.y - p.r * 0.35;
                  var ds = 1.2;
                  return (
                    <polygon key={si} points={dx+","+(dy-ds)+" "+(dx+ds)+","+dy+" "+dx+","+(dy+ds)+" "+(dx-ds)+","+dy} fill={sc} opacity="0.8" />
                  );
                })}
                {vis ? (
                  <text x={p.x} y={p.y+p.r*0.5+3.5} textAnchor="middle" fill={p.color} fontSize="2.6" fontFamily="serif" fontWeight="600" style={{letterSpacing:"0.1em"}}>{p.name.toUpperCase()}</text>
                ) : (
                  <text x={p.x} y={p.y+pr*0.6+3} textAnchor="middle" fill="#334155" fontSize="2.2" fontFamily="serif">???</text>
                )}
              </g>
            );
          })}
        </svg>
      </div>
      <PlanetDetail sel={sel} books={books} u={u} close={function(){setSel(null);}} />
      <div style={{maxWidth:"800px",margin:"12px auto 0",display:"flex",justifyContent:"center",gap:"20px",flexWrap:"wrap",fontSize:"11px",color:"#64748b"}}>
        <span>Arc = read progress</span>
        <span style={{color:"#334155"}}>--- Connection</span>
        <span><span style={{color:"#4a9eff"}}>{"◆"}</span> Shard</span>
        <span>??? = unread</span>
      </div>
    </div>
  );
}

        <div style={{textAlign:"center",padding:"40px",color:"#475569"}}>
          <p style={{fontSize:"24px",marginBottom:"8px"}}>{"🌍"}</p>
          <p style={{fontFamily:"'Cinzel',serif"}}>Worldhopper Tracker</p>
          <p style={{fontSize:"12px",color:"#334155"}}>Coming soon — characters who appear on worlds they are not from.</p>

      )}

        <div style={{textAlign:"center",padding:"40px",color:"#475569"}}>
          <p style={{fontSize:"24px",marginBottom:"8px"}}>{"🔗"}</p>
          <p style={{fontFamily:"'Cinzel',serif"}}>Cross-Book References</p>
          <p style={{fontSize:"12px",color:"#334155"}}>Coming soon — objects, magic, and events that connect across books.</p>
        </div>
      )}
    </div>
  );
}

  var selState = useState(null);
  var sel = selState[0];
  var setSel = selState[1];
  var eras = [
    {k:"Mythic",label:"Mythic Past",sub:"Before recorded history",color:"#e2e8f0"},
    {k:"Ancient",label:"Ancient Era",sub:"~7,000 - 4,500 years before Stormlight",color:"#94a3b8"},
    {k:"Classical",label:"Classical Era",sub:"~1,000 - 300 years before Stormlight",color:"#c49a4d"},
    {k:"Modern",label:"Modern Era",sub:"Current events across the Cosmere",color:"#4a9eff"},

            return (
              <div key={era.k} style={{marginBottom:"28px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px"}}>
                  <div style={{height:"1px",flex:1,background:ec+"33"}} />

                </div>
                <div style={{textAlign:"center",marginBottom:"12px"}}>
                  <span style={{fontSize:"11px",color:"#475569",fontStyle:"italic"}}>{era.sub}</span>

                    return (
                      <div key={i} onClick={function(){setSel(isSel?null:era.k+"-"+i);}} style={{marginBottom:"8px",cursor:"pointer"}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
                          <div style={{position:"relative",left:"-20px",flexShrink:0,width:"24px",height:"24px",borderRadius:"50%",background:e.color,border:"3px solid #111827",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}}>{WI[e.world]||"."}</div>
                          <div style={{flex:1,background:isSel?e.color+"0a":"transparent",border:"1px solid "+(isSel?e.color+"22":"transparent"),borderRadius:"8px",padding:"10px 12px"}}>

                            <div style={{fontSize:"11px",color:"#64748b",marginTop:"2px"}}>{e.world}</div>

                          </div>
                        </div>
                      </div>
                    );
                  })}

              </div>

          })}
          {!sa && TIMELINE.length > visible.length && <div style={{textAlign:"center",padding:"16px",color:"#334155",fontSize:"12px"}}>{"🔒 "+(TIMELINE.length - visible.length)+" events locked"}</div>}

  );
}

// ── Profile-based LocalStorage persistence ──
var LS_PROFILES = "cosmere_catalogue_profiles";
var LS_ACTIVE = "cosmere_catalogue_active_profile";
var DEFAULT_PROFILE = "crave";

function getProfiles() {
  try {
    var raw = localStorage.getItem(LS_PROFILES);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}
function getActiveProfile() {
  try {
    return localStorage.getItem(LS_ACTIVE) || DEFAULT_PROFILE;
  } catch(e) {}
  return DEFAULT_PROFILE;
}
function saveProfiles(profiles) {
  try { localStorage.setItem(LS_PROFILES, JSON.stringify(profiles)); } catch(e) {}
}
function saveActiveProfile(name) {
  try { localStorage.setItem(LS_ACTIVE, name); } catch(e) {}
}
function getProfileData(name) {
  var profiles = getProfiles();
  return profiles[name] || null;
}
function saveProfileData(name, books, au) {
  var profiles = getProfiles();
  var data = {};
  books.forEach(function(b) { data[b.id] = {read:b.read, owned:b.owned}; });
  au.forEach(function(s) { data["au_"+s.id] = {read:s.read, owned:s.owned}; });
  profiles[name] = data;
  saveProfiles(profiles);
}
function applyProfileData(arr, prefix, profileName) {
  var saved = getProfileData(profileName);
  if (!saved) return arr;
  return arr.map(function(b) {
    var key = prefix ? prefix + b.id : b.id;
    var s = saved[key];
    if (s) {
      var copy = Object.assign({}, b);
      if (s.read !== undefined) copy.read = s.read;
      if (s.owned !== undefined) copy.owned = s.owned;
      return copy;
    }
    return b;
  });
}
// Migrate old single-profile data if it exists
(function migrateOldData() {
  try {
    var old = localStorage.getItem("cosmere_catalogue_progress");
    if (old && !localStorage.getItem(LS_PROFILES)) {
      var profiles = {};
      profiles[DEFAULT_PROFILE] = JSON.parse(old);
      saveProfiles(profiles);
      localStorage.removeItem("cosmere_catalogue_progress");
    }
  } catch(e) {}
})();

// ── Main App ──
function App() {
  var profState = useState(getActiveProfile);
  var activeProfile = profState[0];
  var setActiveProfile = profState[1];
  var dropState = useState(false);
  var dropOpen = dropState[0];
  var setDropOpen = dropState[1];
  var newState = useState(false);
  var showNew = newState[0];
  var setShowNew = newState[1];
  var nameState = useState("");
  var newName = nameState[0];
  var setNewName = nameState[1];

  var booksState = useState(function() { return applyProfileData(B0, "", getActiveProfile()); });
  var books = booksState[0];
  var setBooks = booksState[1];
  var auState = useState(function() { return applyProfileData(AU0, "au_", getActiveProfile()); });
  var au = auState[0];
  var setAu = auState[1];
  var tabState = useState("list");
  var tab = tabState[0];
  var setTab = tabState[1];
  var filterState = useState("all");
  var filter = filterState[0];
  var setFilter = filterState[1];
  var saState = useState(false);
  var sa = saState[0];
  var setSA = saState[1];

  // Persist progress to localStorage on every change
  useEffect(function() { saveProfileData(activeProfile, books, au); }, [books, au, activeProfile]);

  function switchProfile(name) {
    // Save current first
    saveProfileData(activeProfile, books, au);
    saveActiveProfile(name);
    setActiveProfile(name);
    setBooks(applyProfileData(B0, "", name));
    setAu(applyProfileData(AU0, "au_", name));
    setDropOpen(false);
  }
  function createProfile(name) {
    if (!name.trim()) return;
    var clean = name.trim();
    saveActiveProfile(clean);
    setActiveProfile(clean);
    // New profile starts with all books unread
    var freshBooks = B0.map(function(b) { return Object.assign({}, b, {read:false, owned:false}); });
    var freshAu = AU0.map(function(s) { return Object.assign({}, s, {read:false}); });
    setBooks(freshBooks);
    setAu(freshAu);
    saveProfileData(clean, freshBooks, freshAu);
    setShowNew(false);
    setNewName("");
    setDropOpen(false);
  }
  function deleteProfile(name) {
    if (name === DEFAULT_PROFILE) return;
    var profiles = getProfiles();
    delete profiles[name];
    saveProfiles(profiles);
    if (activeProfile === name) {
      switchProfile(DEFAULT_PROFILE);
    }
    setDropOpen(false);
  }
  var profileNames = Object.keys(getProfiles());
  if (profileNames.indexOf(DEFAULT_PROFILE) === -1) profileNames.unshift(DEFAULT_PROFILE);

  var sp = mkSp(books, au, sa);

  // Merge for counts (skip edge_au to avoid double-counting)
  var auU = au.filter(function(s){return s.id !== "edge_au";});
  var all = books.concat(auU);
  var tR = all.filter(function(b){return b.read;}).length;
  var tB = all.length;
  var pct = Math.round((tR / tB) * 100);
  var pR = all.filter(function(b){return b.read;}).reduce(function(s,b){return s + b.pages;}, 0);
  var pT = all.reduce(function(s,b){return s + b.pages;}, 0);

  // All books merged for spoiler-aware tabs
  var allBooks = books.slice();
  au.forEach(function(s) {
    if (!allBooks.find(function(b){return b.id === s.id;})) {
      allBooks.push(Object.assign({}, s, {series: "AU"}));
    }
  });

  var tabs = [
    {k:"list",l:"📚 List"},
    {k:"worlds",l:"🌍 Worlds"},
    {k:"shards",l:"✦ Star Map"},
    {k:"hoid",l:"🎭 Hoid"},
    {k:"connections",l:"🕸 Connections"},
    {k:"time",l:"⏳ Timeline"}
  ];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(170deg,#0a0c14,#111827 40%,#0f1520)",color:"#e2e8f0",fontFamily:"'Crimson Text','Georgia',serif"}}>
      <div style={{padding:"48px 24px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 50% 0%,rgba(74,158,255,0.08),transparent 60%)",pointerEvents:"none"}} />
        <div style={{fontSize:"11px",letterSpacing:"6px",textTransform:"uppercase",color:"#64748b",fontFamily:"'Cinzel',serif",marginBottom:"12px"}}>Brandon Sanderson</div>
        <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(28px,5vw,42px)",fontWeight:600,margin:"0 0 16px",background:"linear-gradient(135deg,#e2e8f0,#94a3b8 50%,#e2e8f0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"2px"}}>Cosmere Catalogue</h1>

        {/* Profile selector */}
        <div style={{position:"relative",display:"inline-block",marginBottom:"20px"}}>
          <button onClick={function(){setDropOpen(!dropOpen);setShowNew(false);}} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 16px",background:"#1e293b",border:"1px solid #334155",borderRadius:"8px",cursor:"pointer",color:"#e2e8f0",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>
            <span style={{color:"#64748b",fontSize:"11px"}}>{"👤"}</span>
            <span>{activeProfile}</span>
            <span style={{color:"#475569",fontSize:"10px",marginLeft:"4px"}}>{dropOpen ? "▲" : "▼"}</span>
          </button>
          {dropOpen && (
            <div style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",marginTop:"4px",background:"#1e293b",border:"1px solid #334155",borderRadius:"8px",minWidth:"180px",zIndex:100,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
              {profileNames.map(function(name) {
                var isActive = name === activeProfile;
                var isDefault = name === DEFAULT_PROFILE;
                return (
                  <div key={name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderBottom:"1px solid #334155",background:isActive?"#334155":"transparent",cursor:"pointer"}} onClick={function(){if(!isActive)switchProfile(name);}}>
                    <span style={{fontSize:"13px",color:isActive?"#e2e8f0":"#94a3b8",fontFamily:"'Cinzel',serif"}}>{isActive?"✓ ":""}{name}</span>
                    {!isDefault && !isActive && (
                      <button onClick={function(e){e.stopPropagation();if(confirm("Delete profile \""+name+"\"?"))deleteProfile(name);}} style={{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:"12px",padding:"2px 6px"}}>{"✕"}</button>
                    )}
                  </div>
                );
              })}
              {!showNew ? (
                <div onClick={function(){setShowNew(true);}} style={{padding:"8px 14px",cursor:"pointer",color:"#4a9eff",fontSize:"13px",fontFamily:"'Cinzel',serif"}}>{"+ New Profile"}</div>
              ) : (
                <div style={{padding:"8px 14px",display:"flex",gap:"6px"}}>

                  <button onClick={function(){createProfile(newName);}} style={{padding:"4px 10px",background:"#4a9eff",border:"none",borderRadius:"4px",color:"#fff",fontSize:"12px",cursor:"pointer"}}>Add</button>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{display:"flex",justifyContent:"center",gap:"clamp(20px,4vw,40px)",flexWrap:"wrap",marginBottom:"24px"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,background:"linear-gradient(135deg,#4a9eff,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{fm(pR)}</div>
            <div style={{fontSize:"10px",color:"#64748b",letterSpacing:"2px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>Pages Read</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,color:"#475569"}}>{fm(pT - pR)}</div>

          </div>

            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,color:"#94a3b8"}}>{fm(pT)}</div>
            <div style={{fontSize:"10px",color:"#64748b",letterSpacing:"2px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>Total Pages</div>

        <div style={{maxWidth:"400px",margin:"0 auto 24px"}}>

      <div style={{padding:"24px 16px 48px"}}>
        {tab === "list" && <TabList books={books} setBooks={setBooks} au={au} setAu={setAu} filter={filter} setFilter={setFilter} />}
        {tab === "worlds" && <TabWorlds books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "shards" && <TabShards books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "hoid" && <TabHoid books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "connections" && <TabConnections books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "time" && <TabTime books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
