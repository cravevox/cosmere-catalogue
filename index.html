// ── Spoiler helpers ──
function mkSp(books, au, sa) {
  const rs = new Set();
  books.forEach(b => b.read && rs.add(b.id));
  au.forEach(a => a.read && rs.add(a.id));
  return {
    u: (req) => sa || req.every(id => rs.has(id)),
    uA: (req) => sa || req.length === 0 || req.some(id => rs.has(id)),
    sa
  };
}

    sh:[{name:"No full Shard",r:["6th"],d:"Patji has Investiture.",su:[{t:"Autonomy's Avatar",r:["bom"],c:"Patji is an avatar."}]}],

    bk:["tress"]},
  {name:"Komashi",icon:"\uD83C\uDFA8",color:"#ec4899",bg:"#2a1a22",db:"Two linked cultures.",

const SER = ["Stormlight Archive","Mistborn Era 1","Mistborn Era 2","Standalone","Secret Projects"];
const SC = {
  "Stormlight Archive":{bg:"#1a2744",a:"#4a9eff",g:"rgba(74,158,255,0.15)"},
  "Mistborn Era 1":{bg:"#2a1a1a",a:"#c44d4d",g:"rgba(196,77,77,0.15)"},
  "Mistborn Era 2":{bg:"#2a2019",a:"#c49a4d",g:"rgba(196,154,77,0.15)"},
  "Standalone":{bg:"#1a2a1e",a:"#4dc470",g:"rgba(77,196,112,0.15)"},
  "Secret Projects":{bg:"#1a2a2a",a:"#4dc4b8",g:"rgba(77,196,184,0.15)"},
  "AU":{bg:"#251a2a",a:"#9b4dc4",g:"rgba(155,77,196,0.15)"},
};
const WI = {"Roshar":"\u26C8","Scadrial":"\uD83C\uDF2B","Sel":"\u2726","Nalthis":"\uD83C\uDF08","Threnody":"\uD83D\uDC7B","First of the Sun":"\uD83D\uDC26","Taldain":"\u2600","Lumar":"\uD83C\uDF0A","Komashi":"\uD83C\uDFA8","Canticle":"\uD83D\uDD25"};
const fm = n => n.toLocaleString();

// ── Shared UI ──
function Toggle({on, set}) {
  return (
    <div style={{display:"flex",justifyContent:"center",marginBottom:"16px",gap:"12px",alignItems:"center"}}>
      <span style={{fontSize:"13px",color:"#64748b"}}>Progressive</span>
      <button onClick={function(){set(!on);}} style={{width:"48px",height:"26px",borderRadius:"13px",border:"none",cursor:"pointer",background:on?"#4a9eff":"#334155",position:"relative"}}>
        <div style={{width:"20px",height:"20px",borderRadius:"50%",background:"#fff",position:"absolute",top:"3px",left:on?"25px":"3px"}} />
      </button>
      <span style={{fontSize:"13px",color:on?"#4a9eff":"#64748b"}}>Show all</span>
    </div>
  );
}

function Sec({title, color, desc, children}) {
  var s = useState(false);
  var open = s[0];
  var setOpen = s[1];
  return (
    <div style={{marginBottom:"8px",background:color+"06",borderRadius:"8px",border:"1px solid "+color+"12",overflow:"hidden"}}>
      <button onClick={function(){setOpen(!open);}} style={{width:"100%",padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"14px",fontWeight:600,color:color}}>{title}</div>
          {desc && <div style={{fontSize:"12px",color:"#94a3b8",marginTop:"2px"}}>{desc}</div>}
        </div>
        {children && <span style={{fontSize:"12px",color:"#64748b",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}>v</span>}
      </button>
      {open && children && <div style={{padding:"0 14px 10px"}}>{children}</div>}
    </div>
  );
}

function SubSec({title, color, content}) {
  var s = useState(false);
  var open = s[0];
  var setOpen = s[1];
  return (
    <div>
      <button onClick={function(){setOpen(!open);}} style={{width:"100%",padding:"6px 0",background:"transparent",border:"none",borderTop:"1px solid "+color+"10",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:"12px",color:color,fontFamily:"'Cinzel',serif"}}>{title}</span>
        <span style={{fontSize:"11px",color:"#64748b",transform:open?"rotate(180deg)":"rotate(0deg)"}}>v</span>
      </button>
      {open && <p style={{fontSize:"12px",color:"#94a3b8",lineHeight:1.7,margin:"4px 0 8px",whiteSpace:"pre-line"}}>{content}</p>}
    </div>
  );
}

// ── Tab 1: Reading List ──
function TabList({books, setBooks, au, setAu, filter, setFilter}) {
  function tR(id) { setBooks(function(p){return p.map(function(b){return b.id===id?Object.assign({},b,{read:!b.read,owned:!b.read?true:b.owned}):b;});}); }
  function tO(id) { setBooks(function(p){return p.map(function(b){return b.id===id?Object.assign({},b,{owned:!b.owned}):b;});}); }
  function tA(id) { setAu(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{read:!s.read}):s;});}); }
  var expState = useState({});
  var exp = expState[0];
  function toggleExp(k) { expState[1](function(p){var n={};for(var x in p)n[x]=p[x];n[k]=!p[k];return n;}); }

  var fil = books.filter(function(b) {
    if (filter==="read") return b.read;
    if (filter==="unread") return !b.read;
    if (filter==="owned") return b.owned && !b.read;
    return true;
  });
  var auFil = au.filter(function(s) {
    if (filter==="read") return s.read;
    if (filter==="unread") return !s.read;
    return filter==="all";
  });

  var all = books.concat(au);
  var RO = ["tlm","tress","yumi","shadows","jak","11th","ws_ex","sunlit","ember"];
  var nU = RO.filter(function(id){var b=all.find(function(x){return x.id===id;});return b&&!b.read;});

  var auC = SC["AU"];
  var auRead = au.filter(function(s){return s.read;}).length;

  function renderBook(bk, c, togRead, togOwn, i, total) {
    return (
      <div key={bk.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 20px",borderBottom:i<total-1?"1px solid "+c.a+"11":"none",opacity:bk.read?0.55:1}}>
        <button onClick={function(){togRead(bk.id);}} style={{width:"22px",height:"22px",borderRadius:"50%",border:bk.read?"2px solid "+c.a:"2px solid #475569",background:bk.read?c.a:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"11px",color:bk.read?"#fff":"transparent"}}>{"✓"}</button>
        <span style={{fontSize:"16px",flexShrink:0,width:"24px",textAlign:"center"}}>{WI[bk.world]||"."}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"15px",fontWeight:600,color:bk.read?"#94a3b8":"#e2e8f0",textDecoration:bk.read?"line-through":"none"}}>{bk.title}</div>
          <div style={{fontSize:"12px",color:"#64748b",marginTop:"2px"}}>
            {bk.ps && <span style={{color:c.a,opacity:0.7}}>{bk.ps} · </span>}
            {bk.world} · {bk.type} · {bk.pages} pp
            {bk.note && <span style={{color:c.a,opacity:0.6}}> · {bk.note}</span>}
            {bk.sn && <span style={{color:"#f59e0b",opacity:0.8}}> · {"⚠"} {bk.sn}</span>}
          </div>
        </div>
        {!bk.read && togOwn && <button onClick={function(){togOwn(bk.id);}} style={{padding:"4px 10px",borderRadius:"6px",border:bk.owned?"1px solid "+c.a+"44":"1px solid #334155",background:bk.owned?c.a+"11":"transparent",color:bk.owned?c.a:"#475569",fontSize:"11px",fontFamily:"'Cinzel',serif",cursor:"pointer",flexShrink:0}}>{bk.owned?"OWNED":"NEED"}</button>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",gap:"8px",justifyContent:"center",flexWrap:"wrap",marginBottom:"24px"}}>
        {[{k:"all",l:"All"},{k:"read",l:"Read"},{k:"unread",l:"Unread"},{k:"owned",l:"Owned & Unread"}].map(function(f) {
          return <button key={f.k} onClick={function(){setFilter(f.k);}} style={{padding:"6px 16px",borderRadius:"20px",border:filter===f.k?"1px solid #4a9eff":"1px solid #334155",background:filter===f.k?"rgba(74,158,255,0.12)":"transparent",color:filter===f.k?"#4a9eff":"#94a3b8",fontSize:"12px",fontFamily:"'Cinzel',serif",cursor:"pointer"}}>{f.l}</button>;
        })}
      </div>

      {nU.length > 0 && filter !== "read" && (
        <div style={{margin:"0 0 24px",padding:"20px 24px",background:"linear-gradient(135deg,rgba(74,158,255,0.06),rgba(155,77,196,0.06))",border:"1px solid rgba(74,158,255,0.15)",borderRadius:"12px"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:"#4a9eff",marginBottom:"12px"}}>Suggested Reading Order</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center"}}>
            {nU.map(function(id, i) {
              var it = all.find(function(x){return x.id===id;});
              if (!it) return null;
              var c = it.series ? SC[it.series] : auC;
              return (
                <div key={id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{padding:"4px 12px",borderRadius:"6px",background:c.g,border:"1px solid "+c.a+"33",color:c.a,fontSize:"13px",whiteSpace:"nowrap"}}>{(i+1)+". "+it.title+(it.owned?" \uD83D\uDCD6":"")}</span>
                  {i < nU.length - 1 && <span style={{color:"#334155",fontSize:"10px"}}>{"→"}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {SER.map(function(series) {
        var sb = fil.filter(function(b){return b.series===series;}).sort(function(a,b){return a.so-b.so;});
        if (sb.length === 0) return null;
        var c = SC[series];
        var ri = sb.filter(function(b){return b.read;}).length;
        var sp = sb.reduce(function(s,b){return s+b.pages;},0);
        var spr = sb.filter(function(b){return b.read;}).reduce(function(s,b){return s+b.pages;},0);
        var isE = exp[series] !== false;
        return (
          <div key={series} style={{marginBottom:"16px"}}>
            <button onClick={function(){toggleExp(series);}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:c.bg,border:"1px solid "+c.a+"22",borderRadius:isE?"10px 10px 0 0":"10px",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <div style={{width:"3px",height:"24px",background:c.a,borderRadius:"2px"}} />
                <span style={{fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600,color:"#e2e8f0"}}>{series}</span>
                <span style={{fontSize:"12px",color:c.a,opacity:0.7}}>{ri+"/"+sb.length}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
                <span style={{fontSize:"12px",color:"#64748b"}}>{fm(spr)+"/"+fm(sp)+" pp"}</span>
                <span style={{color:"#64748b",fontSize:"14px",transform:isE?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
              </div>
            </button>
            {isE && (
              <div style={{background:c.bg+"88",border:"1px solid "+c.a+"22",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
                {sb.map(function(bk, i) { return renderBook(bk, c, tR, tO, i, sb.length); })}
              </div>
            )}
          </div>
        );
      })}

      {(filter === "all" || auFil.length > 0) && (
        <div style={{marginBottom:"16px"}}>
          <button onClick={function(){toggleExp("AU");}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:auC.bg,border:"1px solid "+auC.a+"22",borderRadius:exp["AU"]!==false?"10px 10px 0 0":"10px",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <div style={{width:"3px",height:"24px",background:auC.a,borderRadius:"2px"}} />
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600,color:"#e2e8f0"}}>Arcanum Unbounded</span>
              <span style={{fontSize:"12px",color:auC.a,opacity:0.7}}>{auRead+"/"+au.length}</span>
            </div>
            <span style={{color:"#64748b",fontSize:"14px",transform:exp["AU"]!==false?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
          </button>
          {exp["AU"] !== false && (
            <div style={{background:auC.bg+"88",border:"1px solid "+auC.a+"22",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
              <div style={{padding:"10px 20px 6px",fontSize:"12px",color:"#64748b",fontStyle:"italic"}}>A collection of Cosmere short fiction.</div>
              {auFil.map(function(st, i) { return renderBook(st, auC, tA, null, i, auFil.length); })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Tab 2: Worlds ──
function TabWorlds({books, sa, setSA, sp}) {
  var u = sp.u;
  var expanded = useState(null);
  var sel = expanded[0];
  var setSel = expanded[1];

  return (
    <div>
      <Toggle on={sa} set={setSA} />
      {!sa && <p style={{textAlign:"center",color:"#64748b",fontSize:"12px",marginBottom:"20px",fontStyle:"italic"}}>Lore reveals as you read.</p>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"16px"}}>
        {WD.map(function(w) {
          var isO = sel === w.name;
          var wb = w.bk.map(function(id){return books.find(function(b){return b.id===id;});}).filter(Boolean);
          var anyR = wb.some(function(b){return b.read;}) || sa;
          var rc = wb.filter(function(b){return b.read;}).length;

          if (!anyR) return (
            <div key={w.name} style={{background:w.bg,border:"1px solid "+w.color+"15",borderRadius:"12px",padding:"20px",opacity:0.4}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",background:w.color+"10",border:"2px solid "+w.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px"}}>{w.icon}</div>
                <div><div style={{fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:600,color:"#475569"}}>{w.name}</div><div style={{fontSize:"12px",color:"#334155"}}>Read books to unlock</div></div>
              </div>
            </div>
          );

          var uD = w.ds.filter(function(d){return u(d.r);});
          var uSh = w.sh.filter(function(s){return u(s.r);});
          var uMg = w.mg.filter(function(m){return u(m.r);});

          return (
            <div key={w.name} onClick={function(){if(!isO)setSel(w.name);}} style={{background:w.bg,border:"1px solid "+w.color+(isO?"44":"22"),borderRadius:"12px",cursor:isO?"default":"pointer",overflow:"hidden"}}>
              <div style={{padding:"20px 20px 16px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer"}} onClick={function(){setSel(isO?null:w.name);}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",background:w.color+"18",border:"2px solid "+w.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:0}}>{w.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:600,color:w.color}}>{w.name}</div>
                  <div style={{fontSize:"12px",color:"#64748b"}}>{rc+"/"+wb.length+" books"}</div>
                </div>
                <span style={{color:"#64748b",fontSize:"14px",transform:isO?"rotate(180deg)":"rotate(0deg)"}}>{"v"}</span>
              </div>
              {isO && (
                <div style={{padding:"0 20px 20px"}}>
                  <p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.6,margin:"0 0 8px"}}>{w.db}</p>
                  {uD.map(function(d,i){return <p key={i} style={{fontSize:"13px",color:"#cbd5e1",lineHeight:1.6,margin:"0 0 8px"}}>{d.t}</p>;})}

                  {uSh.length > 0 && (
                    <div style={{marginTop:"12px",marginBottom:"14px"}}>
                      <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:w.color,fontFamily:"'Cinzel',serif",marginBottom:"8px",opacity:0.8}}>Shards</div>
                      {uSh.map(function(s) {
                        var uSu = (s.su||[]).filter(function(sub){return u(sub.r);});
                        return (
                          <Sec key={s.name} title={"◆ "+s.name} color={w.color} desc={s.d}>
                            {uSu.length > 0 ? uSu.map(function(sub){return <SubSec key={sub.t} title={sub.t} color={w.color} content={sub.c} />;}) : null}
                          </Sec>
                        );
                      })}
                    </div>
                  )}

                  {uMg.length > 0 && (
                    <div style={{marginBottom:"14px"}}>
                      <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:w.color,fontFamily:"'Cinzel',serif",marginBottom:"8px",opacity:0.8}}>Magic Systems</div>
                      {uMg.map(function(m) {
                        var uSu = (m.su||[]).filter(function(sub){return u(sub.r);});
                        return (
                          <Sec key={m.name} title={m.name} color={w.color} desc={m.d}>
                            {uSu.length > 0 ? uSu.map(function(sub){return <SubSec key={sub.t} title={sub.t} color={w.color} content={sub.c} />;}) : null}
                          </Sec>
                        );
                      })}
                    </div>
                  )}

                  <div style={{marginTop:"14px"}}>
                    <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:w.color,fontFamily:"'Cinzel',serif",marginBottom:"8px",opacity:0.8}}>Books</div>
                    {wb.map(function(bk) {
                      return (
                        <div key={bk.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"5px 0",opacity:bk.read?0.5:1}}>
                          <span style={{width:"14px",height:"14px",borderRadius:"50%",border:"2px solid "+(bk.read?w.color:"#475569"),background:bk.read?w.color:"transparent",flexShrink:0,fontSize:"8px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{bk.read?"✓":""}</span>
                          <span style={{fontSize:"13px",color:bk.read?"#64748b":"#e2e8f0"}}>{bk.title}</span>
                          <span style={{fontSize:"11px",color:"#475569",marginLeft:"auto"}}>{bk.pages+" pp"}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  {name:"Roshar",x:78,y:22,r:18,color:"#4a9eff",rA:["twok"],sys:"Rosharan"},

var CONNS = [
  {f:"Yolen",t:"Roshar",r:["sh"]},{f:"Yolen",t:"Scadrial",r:["sh"]},

  {f:"Taldain",t:"First of the Sun",r:["bom"]},{f:"Taldain",t:"Scadrial",r:["bom"]},
];

function makeStars() {
  var stars = [];
  for (var i = 0; i < 60; i++) {
    stars.push({
      cx: (i * 17 + 7) % 100,
      cy: (i * 23 + 11) % 100,
      r: 0.1 + ((i * 7) % 10) * 0.03,
      fill: i % 7 === 0 ? "#fbbf24" : i % 11 === 0 ? "#ef4444" : "#e2e8f0",
      op: 0.15 + ((i * 3) % 10) * 0.035
    });
  }
  return stars;
}
var STARS = makeStars();

function ProgressArc(props) {
  if (props.pct <= 0 || props.pct >= 1) return null;
  var circ = 2 * Math.PI * props.r;
  return (
    <circle cx={props.cx} cy={props.cy} r={props.r} fill="none" stroke={props.color}
      strokeWidth="0.5" strokeDasharray={circ * props.pct + " " + circ * (1 - props.pct)}
      strokeDashoffset={circ * 0.25} opacity="0.5"
      transform={"rotate(-90 " + props.cx + " " + props.cy + ")"} />
  );
}

function PlanetDetail(props) {
  var sel = props.sel;
  var books = props.books;
  var u = props.u;
  if (!sel) return null;
  var planet = PLANETS.find(function(p){return p.name === sel;});
  var world = WD.find(function(w){return w.name === sel;});
  if (!planet || !world) return null;
  var wb = books.filter(function(b){return b.world === sel;});
  var uD = world.ds.filter(function(d){return u(d.r);});
  var uSh = world.sh.filter(function(s){return u(s.r);});

  return (
    <div style={{maxWidth:"800px",margin:"16px auto 0",padding:"20px 24px",background:world.bg,border:"1px solid " + world.color + "33",borderRadius:"12px"}}>

        <div style={{width:"40px",height:"40px",borderRadius:"50%",background:world.color+"18",border:"2px solid "+world.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{world.icon}</div>
        <div style={{flex:1}}>

      </div>
      <p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.6,margin:"0 0 8px"}}>{world.db}</p>
      {uD.map(function(d,i){return <p key={i} style={{fontSize:"13px",color:"#cbd5e1",lineHeight:1.6,margin:"0 0 8px"}}>{d.t}</p>;})}
      {uSh.length > 0 && (
        <div style={{marginTop:"8px"}}>
          <span style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:world.color,fontFamily:"'Cinzel',serif",opacity:0.8}}>Shards: </span>
          <span style={{fontSize:"13px",color:"#cbd5e1"}}>{uSh.map(function(s){return s.name;}).join(", ")}</span>
        </div>
      )}
      {wb.length > 0 && (
        <div style={{marginTop:"10px"}}>
          <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:world.color,fontFamily:"'Cinzel',serif",marginBottom:"6px",opacity:0.8}}>Books</div>

              <div key={bk.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"4px 0",opacity:bk.read?0.5:1}}>

                <span style={{fontSize:"13px",color:bk.read?"#64748b":"#e2e8f0"}}>{bk.title}</span>
                <span style={{fontSize:"11px",color:"#475569",marginLeft:"auto"}}>{bk.pages+" pp"}</span>
              </div>
            );
          })}
        </div>
      )}
      <p style={{fontSize:"11px",color:"#475569",marginTop:"10px",fontStyle:"italic"}}>See Worlds tab for magic systems.</p>
    </div>

}

function StarMap(props) {
  var books = props.books;
  var u = props.sp.u;
  var uA = props.sp.uA;
  var selState = useState(null);
  var sel = selState[0];
  var setSel = selState[1];

  function gP(name) { return PLANETS.find(function(p){return p.name===name;}); }

  return (
    <div>
      <div style={{position:"relative",width:"100%",maxWidth:"800px",margin:"0 auto",aspectRatio:"4/3",background:"radial-gradient(ellipse at 50% 40%,#0f1729,#080c18 50%,#050810)",borderRadius:"16px",border:"1px solid #1e293b",overflow:"hidden"}}>
        <svg viewBox="0 0 100 100" style={{width:"100%",height:"100%"}}>
          {STARS.map(function(s, i) {
            return <circle key={"st"+i} cx={s.cx} cy={s.cy} r={s.r} fill={s.fill} opacity={s.op} />;
          })}
          {CONNS.map(function(cn, i) {
            if (!u(cn.r)) return null;
            var a = gP(cn.f);
            var b = gP(cn.t);
            return <line key={"cn"+i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#334155" strokeWidth="0.3" strokeDasharray="1,1" opacity="0.5" />;
          })}
          {PLANETS.map(function(p) {
            var vis = p.isY || uA(p.rA);
            var isSel = sel === p.name;
            var wb = books.filter(function(b){return b.world === p.name;});
            var rP = wb.length > 0 ? wb.filter(function(b){return b.read;}).length / wb.length : 0;
            var pr = p.r * 0.35;

            if (p.isY) {
              return (
                <g key={p.name} onClick={function(){setSel(sel===p.name?null:p.name);}} style={{cursor:"pointer"}}>
                  <circle cx={p.x} cy={p.y} r={p.r*0.4} fill="none" stroke="#e2e8f033" strokeWidth="0.3" strokeDasharray="0.8,0.8" />
                  <circle cx={p.x} cy={p.y} r={2} fill="#e2e8f0" opacity="0.6" />
                  <text x={p.x} y={p.y+5} textAnchor="middle" fill="#64748b" fontSize="2.5" fontFamily="serif" style={{letterSpacing:"0.15em"}}>YOLEN</text>
                  <text x={p.x} y={p.y+7.5} textAnchor="middle" fill="#475569" fontSize="1.6" fontFamily="serif">Origin</text>
                </g>
              );
            }

            return (
              <g key={p.name}>
                {vis && <circle cx={p.x} cy={p.y} r={p.r*0.6} fill={p.color+"08"} />}
                {vis && <circle cx={p.x} cy={p.y} r={p.r*0.5} fill="none" stroke={p.color+"33"} strokeWidth="0.4" />}
                <circle cx={p.x} cy={p.y} r={vis ? pr : pr*0.6}
                  fill={vis ? p.color : "#1e293b"} opacity={vis ? 0.9 : 0.3}
                  stroke={isSel ? p.color : "none"} strokeWidth="0.8"
                  onClick={function(){if(vis)setSel(sel===p.name?null:p.name);}}
                  style={{cursor:vis?"pointer":"default"}} />
                {vis && <ProgressArc cx={p.x} cy={p.y} r={p.r*0.42} pct={rP} color={p.color} />}
                {vis ? (
                  <text x={p.x} y={p.y+p.r*0.5+3.5} textAnchor="middle" fill={p.color} fontSize="2.6" fontFamily="serif" fontWeight="600" style={{letterSpacing:"0.1em"}}>{p.name.toUpperCase()}</text>
                ) : (
                  <text x={p.x} y={p.y+pr*0.6+3} textAnchor="middle" fill="#334155" fontSize="2.2" fontFamily="serif">???</text>
                )}
              </g>
            );
          })}
        </svg>
      </div>
      <PlanetDetail sel={sel} books={books} u={u} close={function(){setSel(null);}} />
      <div style={{maxWidth:"800px",margin:"12px auto 0",display:"flex",justifyContent:"center",gap:"20px",flexWrap:"wrap",fontSize:"11px",color:"#64748b"}}>
        <span>Arc = read progress</span>
        <span style={{color:"#334155"}}>--- Connection</span>
        <span>??? = unread</span>
      </div>
    </div>
  );
}

                        <td style={{padding:"8px 10px",color:sh?"#94a3b8":"#334155"}}>{sh?d.loc:"???"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      <div style={{fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",color:"#4a9eff",fontFamily:"'Cinzel',serif",marginBottom:"8px",marginTop:"8px"}}>Cosmere Star Map</div>
      <p style={{textAlign:"center",color:"#64748b",fontSize:"12px",marginBottom:"12px",fontStyle:"italic"}}>Tap a planet to see details. Unread worlds appear dim.</p>
      <StarMap books={books} sp={sp} />
    </div>
  );

  );
}

// ── Tab 5: Timeline ──
function TabTime({books, sa, setSA, sp}) {
  var u = sp.u;
  var visible = TIMELINE.filter(function(e){return u(e.req);});
  var selState = useState(null);
  var sel = selState[0];
  var setSel = selState[1];
  var eras = [
    {k:"Mythic",label:"Mythic Past",sub:"Before recorded history",color:"#e2e8f0"},
    {k:"Ancient",label:"Ancient Era",sub:"~7,000 - 4,500 years before Stormlight",color:"#94a3b8"},
    {k:"Classical",label:"Classical Era",sub:"~1,000 - 300 years before Stormlight",color:"#c49a4d"},
    {k:"Modern",label:"Modern Era",sub:"Current events across the Cosmere",color:"#4a9eff"},
    {k:"Future",label:"Far Future",sub:"Centuries to millennia after current events",color:"#4dc4b8"}
  ];

  return (
    <div>
      <Toggle on={sa} set={setSA} />
      <div style={{textAlign:"center",marginBottom:"20px"}}>
        <div style={{fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",color:"#4a9eff",fontFamily:"'Cinzel',serif",marginBottom:"8px"}}>Cosmere Timeline</div>
        <p style={{fontSize:"13px",color:"#64748b",fontStyle:"italic"}}>Major events revealed as you read. Dates are approximate and relative.</p>
      </div>
      {visible.length === 0 ? <p style={{textAlign:"center",color:"#475569"}}>Read books to reveal events.</p> : (
        <div style={{maxWidth:"700px",margin:"0 auto"}}>
          {eras.map(function(era) {
            var events = visible.filter(function(e){return e.era===era.k;});
            if (events.length === 0) return null;
            var ec = era.color;
            return (
              <div key={era.k} style={{marginBottom:"28px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px"}}>
                  <div style={{height:"1px",flex:1,background:ec+"33"}} />
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",color:ec,fontWeight:600}}>{era.label}</span>
                  <div style={{height:"1px",flex:1,background:ec+"33"}} />
                </div>
                <div style={{textAlign:"center",marginBottom:"12px"}}>
                  <span style={{fontSize:"11px",color:"#475569",fontStyle:"italic"}}>{era.sub}</span>
                </div>
                <div style={{position:"relative",paddingLeft:"32px"}}>
                  <div style={{position:"absolute",left:"12px",top:0,bottom:0,width:"2px",background:ec+"22"}} />
                  {events.map(function(e, i) {
                    var isSel = sel === era.k+"-"+i;
                    return (
                      <div key={i} onClick={function(){setSel(isSel?null:era.k+"-"+i);}} style={{marginBottom:"8px",cursor:"pointer"}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
                          <div style={{position:"relative",left:"-20px",flexShrink:0,width:"24px",height:"24px",borderRadius:"50%",background:e.color,border:"3px solid #111827",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}}>{WI[e.world]||"."}</div>
                          <div style={{flex:1,background:isSel?e.color+"0a":"transparent",border:"1px solid "+(isSel?e.color+"22":"transparent"),borderRadius:"8px",padding:"10px 12px"}}>
                            <div style={{fontFamily:"'Cinzel',serif",fontSize:e.big?"15px":"13px",fontWeight:600,color:e.color}}>{e.name}</div>
                            <div style={{fontSize:"11px",color:"#64748b",marginTop:"2px"}}>{e.world}</div>
                            {isSel && <p style={{fontSize:"13px",color:"#cbd5e1",lineHeight:1.6,margin:"8px 0 0"}}>{e.desc}</p>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          {!sa && TIMELINE.length > visible.length && <div style={{textAlign:"center",padding:"16px",color:"#334155",fontSize:"12px"}}>{"🔒 "+(TIMELINE.length - visible.length)+" events locked"}</div>}
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App() {
  var booksState = useState(B0);
  var books = booksState[0];
  var setBooks = booksState[1];
  var auState = useState(AU0);
  var au = auState[0];
  var setAu = auState[1];
  var tabState = useState("list");
  var tab = tabState[0];
  var setTab = tabState[1];
  var filterState = useState("all");
  var filter = filterState[0];
  var setFilter = filterState[1];
  var saState = useState(false);
  var sa = saState[0];
  var setSA = saState[1];

  var sp = mkSp(books, au, sa);

  // Merge for counts (skip edge_au to avoid double-counting)
  var auU = au.filter(function(s){return s.id !== "edge_au";});
  var all = books.concat(auU);
  var tR = all.filter(function(b){return b.read;}).length;
  var tB = all.length;
  var pct = Math.round((tR / tB) * 100);
  var pR = all.filter(function(b){return b.read;}).reduce(function(s,b){return s + b.pages;}, 0);
  var pT = all.reduce(function(s,b){return s + b.pages;}, 0);

  // All books merged for spoiler-aware tabs
  var allBooks = books.slice();
  au.forEach(function(s) {
    if (!allBooks.find(function(b){return b.id === s.id;})) {
      allBooks.push(Object.assign({}, s, {series: "AU"}));
    }
  });

  var tabs = [
    {k:"list",l:"📚 List"},
    {k:"worlds",l:"🌍 Worlds"},
    {k:"shards",l:"◆ Shards"},
    {k:"hoid",l:"🎭 Hoid"},
    {k:"time",l:"⏳ Timeline"}
  ];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(170deg,#0a0c14,#111827 40%,#0f1520)",color:"#e2e8f0",fontFamily:"'Crimson Text','Georgia',serif"}}>
      <div style={{padding:"48px 24px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 50% 0%,rgba(74,158,255,0.08),transparent 60%)",pointerEvents:"none"}} />
        <div style={{fontSize:"11px",letterSpacing:"6px",textTransform:"uppercase",color:"#64748b",fontFamily:"'Cinzel',serif",marginBottom:"12px"}}>Brandon Sanderson</div>
        <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(28px,5vw,42px)",fontWeight:600,margin:"0 0 28px",background:"linear-gradient(135deg,#e2e8f0,#94a3b8 50%,#e2e8f0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"2px"}}>Cosmere Catalogue</h1>

        <div style={{display:"flex",justifyContent:"center",gap:"clamp(20px,4vw,40px)",flexWrap:"wrap",marginBottom:"24px"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,background:"linear-gradient(135deg,#4a9eff,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{fm(pR)}</div>
            <div style={{fontSize:"10px",color:"#64748b",letterSpacing:"2px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>Pages Read</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,color:"#475569"}}>{fm(pT - pR)}</div>
            <div style={{fontSize:"10px",color:"#64748b",letterSpacing:"2px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>Pages Left</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,3.5vw,30px)",fontWeight:700,color:"#94a3b8"}}>{fm(pT)}</div>
            <div style={{fontSize:"10px",color:"#64748b",letterSpacing:"2px",fontFamily:"'Cinzel',serif",textTransform:"uppercase"}}>Total Pages</div>
          </div>
        </div>

        <div style={{maxWidth:"400px",margin:"0 auto 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#94a3b8",marginBottom:"8px",fontFamily:"'Cinzel',serif"}}><span>{tR+" of "+tB}</span><span>{pct+"%"}</span></div>
          <div style={{height:"6px",background:"#1e293b",borderRadius:"3px",overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#4a9eff,#a78bfa,#4dc4b8)",borderRadius:"3px"}} />
          </div>
        </div>

        <div style={{display:"flex",justifyContent:"center",maxWidth:"600px",margin:"0 auto",overflowX:"auto"}}>
          {tabs.map(function(t, i) {
            return (
              <button key={t.k} onClick={function(){setTab(t.k);}} style={{
                padding:"10px 14px",
                background:tab===t.k?"rgba(74,158,255,0.1)":"transparent",
                border:"1px solid",
                borderColor:tab===t.k?"#4a9eff44":"#334155",
                borderRadius:i===0?"8px 0 0 8px":i===tabs.length-1?"0 8px 8px 0":"0",
                color:tab===t.k?"#4a9eff":"#64748b",
                fontSize:"11px",
                fontFamily:"'Cinzel',serif",
                cursor:"pointer",
                whiteSpace:"nowrap",
                flexShrink:0
              }}>{t.l}</button>
            );
          })}
        </div>
      </div>

      <div style={{padding:"24px 16px 48px"}}>
        {tab === "list" && <TabList books={books} setBooks={setBooks} au={au} setAu={setAu} filter={filter} setFilter={setFilter} />}
        {tab === "worlds" && <TabWorlds books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "shards" && <TabShards books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "hoid" && <TabHoid books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
        {tab === "time" && <TabTime books={allBooks} sa={sa} setSA={setSA} sp={sp} />}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
